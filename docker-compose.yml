services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      CORS_ORIGINS: "${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}"
      # Use pdflatex inside this image; set only if you run a separate HTTP compile service.
      PDF_REMOTE_COMPILE_URL: "${PDF_REMOTE_COMPILE_URL:-}"
